<main>
    <section>
        <h2>Our Locations</h2>

        <address>
            <h3>Quezon City Branch</h3>
            <p>123 Katipunan Avenue<br>
            Quezon City, Philippines</p>
        </address>

        <address>
            <h3>Makati Branch</h3>
            <p>456 Ayala Avenue<br>
            Makati City, Philippines</p>
        </address>
    </section>

    <section>
        <h2>Newsletter Signup</h2>

        <form action="#" method="post">

            <p>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </p>

            <p>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </p>

            <p>
                <label for="favorite-drink">Favorite Drink:</label>
                <select id="favorite-drink" name="favorite-drink">
                    <option value="espresso">Espresso</option>
                    <option value="cappuccino">Cappuccino</option>
                    <option value="latte">Latte</option>
                </select>
            </p>

            <p>
                <label for="weekly-updates">Subscribe to Weekly Updates:</label>
                <input type="checkbox" id="weekly-updates" name="weekly-updates">
            </p>

            <p>
                <button type="submit">Subscribe</button>
            </p>

        </form>
    </section>
